<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Letterboxd Blend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="blend.css">
</head>

<body>
<div id="one-sided-modal" class="modal">
  <div class="modal-content insight-modal-content">

    <h2 class="modal-heading" id="insight-modal-heading">Incomplete Ratings</h2>

    <div id="modal-movies" class="insight-modal-grid"></div>

  </div>
</div>

<div id="choose-friends-modal" class="modal">
  <div class="modal-content">

    <button id="close-choose-friends">
      ✕
    </button>

    <h2 class="modal-heading">Choose Friends</h2>
    <p class="modal-subtext">People you follow</p>

    <div id="following-list" class="following-list">
      <p id="following-loading-text" class="following-loading-text">
        Loading your following list...
      </p>
    </div>

   <div class="manual-add-row">

    <input
        type="text"
        id="manual-friend-input"
        placeholder="Or type a username"
        autocomplete="off">

    <button
        id="manual-friend-add"
        type="button">
        Add
    </button>

    <button
        id="compare-btn"
        class="compare-btn"
        disabled>
        Compare
    </button>

</div>
  </div>
</div>
<div id="movie-detail-modal" class="modal">
  <div class="modal-content movie-detail-content">
    <div id="movie-detail-body"></div>
  </div>
</div>

<div id="loading-screen">

  <div class="loading-users" id="loading-users-list"></div>

  <p id="loading-text">
    Fetching films...
  </p>

  <div class="progress">
    <div
      id="progress-bar"
      class="progress-fill"
    ></div>
  </div>

</div>

<div class="container">

  <header class="header">
    <h1>Letterboxd <span class="accent">Blend</span></h1>
    <p class="header-tagline">Where your watchlists overlap, disagree, and occasionally fight about Kubrick.</p>
    <div id="users"></div>

    <div id="add-friend-area">

    <button
    id="add-friend-btn"
    class="add-friend-btn">
    + Add Friend
</button>

</div>
  </header>

  <div class="top-dashboard">

    <section class="stats-card">

      <div class="score-circle">
        <span id="compatibility-number">
          0%
        </span>
        <small>Compatibility</small>
      </div>

      <div class="stats-info">
        <h2 id="shared-count"></h2>
        <p id="avg-difference"></p>

        <button
          id="breakdown-btn"
          class="toggle-btn"
        >
          📊 Score Breakdown
        </button>

        <div
          id="score-breakdown"
          class="hidden-section"
        ></div>

        <button
          id="one-sided-btn"
          class="toggle-btn"
        >
          🎭 Incomplete Ratings
        </button>
      </div>

    </section>

    <section class="insights-card">

      <div class="insight-tabs-grid">

        <button type="button" class="insight-tab" id="agreement-btn">
          <span class="insight-tab-icon insight-tab-icon--pink">❤️</span>
          <span class="insight-tab-title">Biggest Agreements</span>
          <span class="insight-tab-desc">Roll credits. Everyone applauded.</span>
        </button>

        <button type="button" class="insight-tab" id="disagreement-btn">
          <span class="insight-tab-icon insight-tab-icon--amber">⚡</span>
          <span class="insight-tab-title">Major Disagreements</span>
          <span class="insight-tab-desc">The audience was split.</span>
        </button>

        <button type="button" class="insight-tab" id="loved-btn">
          <span class="insight-tab-icon insight-tab-icon--green">✦</span>
          <span class="insight-tab-title">Loved Across the Group</span>
          <span class="insight-tab-desc">These earned a place on everyone's favourites list.</span>
        </button>

        <button type="button" class="insight-tab" id="pairwise-btn">
          <span class="insight-tab-icon insight-tab-icon--blue">👥</span>
          <span class="insight-tab-title">Pairwise Compatibility</span>
          <span class="insight-tab-desc">Some duos were clearly watching the same movie.</span>
        </button>

      </div>

    </section>

  </div>

  <section>
    <div class="movies-heading-row">
      <h2 class="movies-heading">
        🍿 Watch Together
      </h2>
    </div>

    <div id="watch-together-grid"></div>
  </section>

  <section>
    <div class="movies-heading-row">
      <h2 class="movies-heading">
        Shared Movies
      </h2>

      <div id="shared-mode-toggle" class="shared-mode-toggle hidden">
        <button id="mode-all-btn" class="mode-btn active" type="button">
          All watched
        </button>
        <button id="mode-any-btn" class="mode-btn" type="button">
          2+ watched
        </button>
      </div>
    </div>

    <div class="movies-controls-row">
      <input
        type="text"
        id="movie-search-input"
        class="movie-search-input"
        placeholder="Search shared movies..."
        autocomplete="off"
      >

      <select id="movie-sort-select" class="movie-sort-select">
        <option value="default">Sort: Best Match</option>
        <option value="title-asc">Title (A–Z)</option>
        <option value="title-desc">Title (Z–A)</option>
        <option value="year-desc">Year (Newest)</option>
        <option value="year-asc">Year (Oldest)</option>
      </select>
    </div>

    <div id="movies-grid"></div>
    <p id="movies-empty-state" class="empty-state hidden"></p>
  </section>

</div>

<script type="module" src="blend.js"></script>

</body>
</html>
