<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Letterboxd Blend</title>
  <link rel="stylesheet" href="blend.css">
</head>

<body>
<div id="one-sided-modal" class="modal">
  <div class="modal-content">

    <button id="close-modal">
      ✕
    </button>

    <h2 class="modal-heading">Incomplete Ratings</h2>

    <div id="modal-movies"></div>

  </div>
</div>

<div id="choose-friends-modal" class="modal">
  <div class="modal-content">

    <button id="close-choose-friends">
      ✕
    </button>

    <h2 class="modal-heading">Choose Friends</h2>
    <p class="modal-subtext">People you follow</p>

    <div id="following-list" class="following-list">
      <p id="following-loading-text" class="following-loading-text">
        Loading your following list...
      </p>
    </div>

    <div class="manual-add-row">
      <input
        type="text"
        id="manual-friend-input"
        placeholder="Or type a username"
        autocomplete="off"
      >
      <button id="manual-friend-add" type="button">Add</button>
    </div>

  </div>
</div>
<div id="loading-screen">

  <div class="loading-users" id="loading-users-list"></div>

  <p id="loading-text">
    Fetching films...
  </p>

  <div class="progress">
    <div
      id="progress-bar"
      class="progress-fill"
    ></div>
  </div>

</div>

<div class="container">

  <header class="header">
    <h1>Letterboxd Blend</h1>
    <div id="users"></div>

    <div id="add-friend-area">
      <button
        id="add-friend-btn"
        class="add-friend-btn"
        type="button"
      >
        + Add Friend
      </button>
    </div>
  </header>

  <div class="top-dashboard">

    <section class="stats-card">

      <div class="score-circle">
        <span id="compatibility-number">
          0%
        </span>
        <small>Compatibility</small>
      </div>

      <div class="stats-info">
        <h2 id="shared-count"></h2>
        <p id="avg-difference"></p>

        <button
          id="one-sided-btn"
          class="toggle-btn"
        >
          🎭 Incomplete Ratings
        </button>

        <div
          id="one-sided-section"
          class="hidden-section"
        ></div>
      </div>

    </section>

    <section class="insights-card">

      <button
        class="toggle-btn"
        id="agreement-btn"
      >
        ❤️ Biggest Agreements
      </button>

      <div
        id="agreements"
        class="hidden-section"
      ></div>

      <button
        class="toggle-btn"
        id="disagreement-btn"
      >
        ⚡ Biggest Disagreements
      </button>

      <div
        id="disagreements"
        class="hidden-section"
      ></div>

      <button
        class="toggle-btn"
        id="pairwise-btn"
      >
        👥 Pairwise Compatibility
      </button>

      <div
        id="pairwise"
        class="hidden-section"
      ></div>

    </section>

  </div>

  <section>
    <div class="movies-heading-row">
      <h2 class="movies-heading">
        Shared Movies
      </h2>

      <div id="shared-mode-toggle" class="shared-mode-toggle hidden">
        <button id="mode-all-btn" class="mode-btn active" type="button">
          All watched
        </button>
        <button id="mode-any-btn" class="mode-btn" type="button">
          2+ watched
        </button>
      </div>
    </div>

    <div id="movies-grid"></div>
  </section>

</div>

<script src="scraper.js"></script>
<script src="blend.js"></script>

</body>
</html>
